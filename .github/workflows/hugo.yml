name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 🔑 必须：声明写入权限
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v4
        with:
          hugo-version: 'latest'
          extended: true
      
      - name: Configure Git for Hugo Modules
        run: |
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
      
      - name: Initialize Hugo Modules
        run: |
          hugo mod init github.com/muwangdao/antiaging-knowledge-base || true
          hugo mod get -u
      
      - name: Build
        run: hugo -D --minify
      
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
