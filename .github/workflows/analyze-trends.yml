name: Analyze Research Trends

on:
  schedule:
    - cron: '0 12 1 * *'  # 每月 1 号中午 12:00 UTC（北京时间 20:00）
  workflow_dispatch:  # 允许手动触发

jobs:
  analyze-trends:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Create data directory
        run: mkdir -p data
      
      - name: Run trend analysis
        id: analysis
        run: |
          python scripts/analyze-trends.py
          echo "analysis_completed=true" >> $GITHUB_OUTPUT
      
      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet content/recent.md || echo "has_changes=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push changes
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/recent.md data/trend_analysis.json
          git pull --rebase origin main
          git commit -m "docs: 自动生成月度趋势简报 $(date +%Y-%m-%d)"
          git push
      
      - name: Create issue if analysis fails
        if: failure()
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "⚠️ 趋势分析失败"
          content-filepath: data/trend-error.md
          labels: automated, trend-analysis
      
      - name: Upload analysis report
        uses: actions/upload-artifact@v4
        with:
          name: trend-analysis-report
          path: data/trend_analysis.json
