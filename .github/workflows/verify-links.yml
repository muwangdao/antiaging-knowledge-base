name: Verify PubMed Links

on:
  push:
    paths:
      - 'content/*.md'
  schedule:
    - cron: '0 6 * * *'  # 每天早上 6 点 UTC（北京时间 14:00）
  workflow_dispatch:

jobs:
  verify-links:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Verify PubMed links
        run: python scripts/verify-links.py
      
      - name: Create issue on failure
        if: failure()
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "⚠️ 发现失效的 PubMed 链接"
          content-filepath: .github/ISSUE_TEMPLATE/broken-links.md
          labels: bug, links, automated
