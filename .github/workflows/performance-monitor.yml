name: Performance Monitor

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时

jobs:
  performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run PageSpeed Insights
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            https://muwangdao.github.io/antiaging-knowledge-base/
            https://muwangdao.github.io/antiaging-knowledge-base/basics/
            https://muwangdao.github.io/antiaging-knowledge-base/metabolism/
          uploadArtifacts: true
          temporaryPublicStorage: true
      
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: pagespeed-results
          path: .lighthouseci
