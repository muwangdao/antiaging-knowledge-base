baseURL = 'https://muwangdao.github.io/antiaging-knowledge-base/'
title = '抗衰老科学前沿知识库'
description = 'AI 驱动的抗衰老科学知识库，每日自动更新最新研究进展'
languageCode = 'zh-CN'
defaultContentLanguage = 'zh-cn'
theme = 'hugo-geekdoc'

enableGitInfo = true
summaryLength = 30

[outputs]
  home = ['HTML', 'RSS']
  page = ['HTML']
  section = ['HTML']

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[params]
  geekdocRepo = 'https://github.com/muwangdao/antiaging-knowledge-base'
  geekdocEditPath = 'edit/main/content'
  geekdocSearch = true
  geekdocShowEditLink = true
  geekdocBreadcrumbPath = 'docs'
  geekdocDefaultSortBy = 'weight'
