<header>
    <h1>{{ .Site.Title }}</h1>
    <p>{{ .Site.Params.description }}</p>
</header>

<nav>
    <a href="{{ "" | relURL }}"{{ if .IsHome }} class="active"{{ end }}>🏠 首页</a>
    {{ range .Site.Menus.main }}
    <a href="{{ .URL | relURL }}"{{ if eq $.Page.Title .Name }} class="active"{{ end }}>{{ .Name }}</a>
    {{ end }}
    
    {{ if .Site.Params.features.search }}
    <div class="search-box">
        <input type="search" placeholder="🔍 搜索全站..." id="search-input" oninput="handleSearch()">
        <button class="search-btn" onclick="triggerSearch()" title="搜索">🔍</button>
    </div>
    {{ end }}
</nav>

<script>
let searchTimeout;

function handleSearch() {
    clearTimeout(searchTimeout);
    const query = document.getElementById('search-input').value.trim();
    
    if (query.length < 2) {
        // 不自动关闭，等待用户点击按钮
        return;
    }
    
    // 延迟 300ms 执行搜索，避免频繁计算
    searchTimeout = setTimeout(() => {
        if (typeof showModal === 'function') {
            if (document.getElementById('search-modal').style.display !== 'flex') {
                showModal();
            }
            displayResults(query);
        }
    }, 300);
}

function triggerSearch() {
    const query = document.getElementById('search-input').value.trim();
    if (query.length < 2) {
        alert('请输入至少 2 个字符进行搜索');
        document.getElementById('search-input').focus();
        return;
    }
    
    if (typeof showModal === 'function') {
        showModal();
        displayResults(query);
    }
}

function searchSite() {
    handleSearch();
}
</script>
